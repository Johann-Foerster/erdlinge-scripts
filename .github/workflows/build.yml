name: Build standalone bundles

on:
  push:
    branches: [main, copilot/build-standalone-app]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: erdlinge-auswertungen-linux
          - os: windows-latest
            artifact: erdlinge-auswertungen-windows
          - os: macos-latest
            artifact: erdlinge-auswertungen-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build bundle
        run: pyinstaller --noconfirm erdlinge.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
